name: Deploy Zoomies page

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - ".nojekyll"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out public site
        uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          set -euo pipefail
          mkdir _site
          cp index.html styles.css app.js .nojekyll _site/
          cp -R assets _site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
