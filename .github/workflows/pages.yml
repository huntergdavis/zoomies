name: Deploy Zoomies page

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - ".nojekyll"
      - "assets/**"
      - "play/**"
      - "vendor/emulatorjs/data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out public site
        uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          set -euo pipefail
          mkdir -p _site/vendor/emulatorjs
          cp index.html styles.css app.js .nojekyll _site/
          cp -R assets _site/assets
          cp -R play _site/play
          cp -R vendor/emulatorjs/data _site/vendor/emulatorjs/data

      - name: Add latest playable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _site/game
          gh release download --repo "$GITHUB_REPOSITORY" \
            --pattern pspsps.bin \
            --pattern pspsps.cue \
            --pattern SHA256SUMS.txt \
            --dir _site/game
          (cd _site/game && sha256sum --check SHA256SUMS.txt)
          tag="$(gh release view --repo "$GITHUB_REPOSITORY" \
            --json tagName --jq .tagName)"
          bin_size="$(stat -c %s _site/game/pspsps.bin)"
          jq -n \
            --arg tag "$tag" \
            --argjson bin_size "$bin_size" \
            '{
              bin_size: $bin_size,
              bin_url: ("../game/pspsps.bin?v=" + $tag),
              bios: "HLE",
              build_id: $tag,
              build_label: ($tag + " public release"),
              core: "pcsx_rearmed",
              cue_url: ("../game/pspsps.cue?v=" + $tag)
            }' > _site/game/metadata.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
