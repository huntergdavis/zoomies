name: Deploy Zoomies page

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - ".nojekyll"
      - "assets/**"
      - "docs/**"
      - "play/**"
      - "vendor/emulatorjs/data/**"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out public site
        uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          set -euo pipefail
          mkdir -p _site/vendor/emulatorjs
          cp index.html styles.css app.js .nojekyll _site/
          cp -R assets _site/assets
          cp -R play _site/play
          cp -R vendor/emulatorjs/data _site/vendor/emulatorjs/data

      - name: Add latest playable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _site/game

          mapfile -t release_assets < <(
            gh release view --repo "$GITHUB_REPOSITORY" \
              --json assets --jq '.assets[].name'
          )
          has_asset() {
            printf '%s\n' "${release_assets[@]}" | grep -Fxq -- "$1"
          }

          if has_asset Zoomies.bin && has_asset Zoomies.cue; then
            disc_bin=Zoomies.bin
            disc_cue=Zoomies.cue
          elif has_asset pspsps.bin && has_asset pspsps.cue; then
            disc_bin=pspsps.bin
            disc_cue=pspsps.cue
          else
            echo "Latest release has no complete supported BIN/CUE pair" >&2
            exit 1
          fi

          gh release download --repo "$GITHUB_REPOSITORY" \
            --pattern "$disc_bin" \
            --pattern "$disc_cue" \
            --pattern SHA256SUMS.txt \
            --dir _site/game

          cover_name=""
          if has_asset Zoomies-cover.png; then
            cover_name=Zoomies-cover.png
            gh release download --repo "$GITHUB_REPOSITORY" \
              --pattern "$cover_name" --dir _site/game
          fi

          verify_release_file() {
            local filename="$1"
            local checksum
            checksum="$(awk -v name="$filename" '$2 == name { print }' \
              _site/game/SHA256SUMS.txt)"
            if [ -z "$checksum" ]; then
              echo "No checksum published for $filename" >&2
              return 1
            fi
            (cd _site/game && printf '%s\n' "$checksum" | sha256sum --check -)
          }
          verify_release_file "$disc_bin"
          verify_release_file "$disc_cue"
          if [ -n "$cover_name" ]; then
            verify_release_file "$cover_name"
          fi

          tag="$(gh release view --repo "$GITHUB_REPOSITORY" \
            --json tagName --jq .tagName)"
          bin_size="$(stat -c %s "_site/game/$disc_bin")"
          jq -n \
            --arg tag "$tag" \
            --arg disc_bin "$disc_bin" \
            --arg disc_cue "$disc_cue" \
            --arg cover_name "$cover_name" \
            --argjson bin_size "$bin_size" \
            '{
              bin_size: $bin_size,
              bin_url: ("../game/" + $disc_bin + "?v=" + $tag),
              bios: "HLE",
              build_id: $tag,
              build_label: ($tag + " public release"),
              core: "pcsx_rearmed",
              cue_url: ("../game/" + $disc_cue + "?v=" + $tag)
            }
            + if $cover_name == "" then {}
              else {cover_url: ("../game/" + $cover_name + "?v=" + $tag)}
              end' > _site/game/metadata.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
